name: Build APK
on: 
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-broken
          sudo apt-get install -y \
            python3-pip build-essential git python3 python3-dev \
            ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev \
            libsdl2-ttf-dev libportmidi-dev libswscale-dev \
            libavformat-dev libavcodec-dev zlib1g-dev \
            libunwind-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libsqlite3-dev sqlite3 bzip2 libbz2-dev liblzma-dev \
            libreadline-dev libncursesw5-dev libffi-dev libssl-dev \
            openssl unzip zip openjdk-17-jdk autoconf libtool \
            pkg-config cmake gettext libltdl-dev ant

      - name: Install Buildozer and Cython
        run: |
          pip3 install --user --upgrade "Cython<3.0"
          pip3 install --user buildozer

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Deep Clean: Remove old folders manually
          rm -rf .buildozer/
          rm -rf bin/
          # Run official clean (ignores error if already empty)
          buildozer android clean || true
          # Start the fresh build
          buildozer android debug
        env:
          ACCEPT_SDK_LICENSE: "y"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
